name: Deploy to Mittwald

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.3.3
        with:
          server: ${{ secrets.MITTWALD_HOST }}
          username: ${{ secrets.MITTWALD_USER }}
          password: ${{ secrets.MITTWALD_PASSWORD }}
          port: 22
          local_path: './dist/public/*'
          remote_path: ${{ secrets.MITTWALD_PATH }}
          sftp_only: true
