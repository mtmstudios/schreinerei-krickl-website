name: Deploy to Mittwald

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy via SFTP (lftp)
        run: |
          sudo apt-get install -y lftp
          lftp -u "${{ secrets.MITTWALD_USER }},${{ secrets.MITTWALD_PASSWORD }}" \
            sftp://${{ secrets.MITTWALD_HOST }} \
            -e "set sftp:auto-confirm yes; set net:max-retries 3; mirror -R --no-perms --exclude api/portal/data/ ./dist/public/ ${{ secrets.MITTWALD_PATH }}; quit"
